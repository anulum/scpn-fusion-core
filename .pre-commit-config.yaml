repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: '\.(npz|npy|pkl|pt|onnx|whl|tar\.gz|png|jpg|svg)$'
      - id: trailing-whitespace
        exclude: '\.(npz|npy|pkl|pt|onnx|whl|tar\.gz|png|jpg|svg)$'

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        files: ^(src/|tests/|tools/|validation/|examples/).*\.py$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(src/|tests/|tools/|validation/|examples/).*\.py$

  - repo: local
    hooks:
      - id: version-metadata-consistency
        name: version metadata consistency guard
        entry: python tools/sync_metadata.py --check
        language: system
        pass_filenames: false
      - id: packaging-contract
        name: packaging contract guard
        entry: python tools/check_packaging_contract.py
        language: system
        pass_filenames: false
      - id: cargo-fmt-check
        name: cargo fmt --check
        entry: cargo fmt --all --check
        language: system
        pass_filenames: false
        files: ^scpn-fusion-rs/
      - id: cargo-clippy
        name: cargo clippy --all-targets --all-features -- -D warnings
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        files: ^scpn-fusion-rs/
