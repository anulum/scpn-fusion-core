# -----------------------------------------------------------------------
# SCPN Fusion Core — Dependabot Configuration
# Security updates are opened as PRs so physics gates and hash-locked
# requirement regeneration still review numerical regressions before merge.
# -----------------------------------------------------------------------
version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    ignore:
      # Dependabot's GitHub Actions updater currently fails with unknown_error
      # on these pinned action refs; keep them under manual review until the
      # updater can resolve them without failing the whole scheduled run.
      - dependency-name: "dtolnay/rust-toolchain"
      - dependency-name: "taiki-e/install-action"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "security"
  - package-ecosystem: "pip"
    directory: "/requirements"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "security"
  - package-ecosystem: "cargo"
    directory: "/scpn-fusion-rs"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
      - "security"
  - package-ecosystem: "cargo"
    directory: "/scpn-fusion-rs/fuzz"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
      - "security"
