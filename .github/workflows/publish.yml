# SCPN Fusion Core — Publish to PyPI
name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (tag/sha/branch). Defaults to current ref."
        required: false
        default: ""
        type: string

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write  # Required for trusted publisher (OIDC)
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Release acceptance checklist gate
        run: |
          expected=""
          if [ "${{ github.event_name }}" = "push" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            expected="${GITHUB_REF_NAME}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.ref }}" ] && [[ "${{ inputs.ref }}" == v* ]]; then
            expected="${{ inputs.ref }}"
          fi

          if [ -n "${expected}" ]; then
            python tools/check_release_acceptance.py --expected-version "${expected}"
          else
            python tools/check_release_acceptance.py --allow-not-ready
          fi
      - name: Install release validation dependencies
        run: |
          pip install --require-hashes -r requirements/ci-py312.txt
          pip install --no-deps -e .
      - name: Run critical release validation
        run: |
          pytest -q tests/test_version_metadata.py
          python tools/run_python_preflight.py --gate release
      - name: Install build tools
        run: pip install --require-hashes -r requirements/build.txt
      - name: Build sdist and wheel
        run: python -m build
      - name: Generate release checksums
        run: |
          python tools/generate_release_checksums.py \
            --dist-dir dist \
            --output-file dist/SHA256SUMS \
            --summary-json artifacts/release_checksums_summary.json
      - name: Verify release checksums
        run: |
          python tools/verify_release_checksums.py \
            --dist-dir dist \
            --manifest dist/SHA256SUMS \
            --summary-json artifacts/release_checksums_verify_summary.json
      - name: Twine metadata check
        run: python -m twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: dist
          path: dist/
      - name: Upload checksum summaries
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: release-checksums
          path: |
            artifacts/release_checksums_summary.json
            artifacts/release_checksums_verify_summary.json

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/scpn-fusion
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7
        with:
          name: dist
          path: dist/
      - name: Verify dist checksums
        run: |
          cd dist
          sha256sum -c SHA256SUMS
      - name: Publish to PyPI (OIDC)
        id: publish_oidc
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        # Uses OIDC trusted publisher — no API token needed
        # Configure at: https://pypi.org/manage/project/scpn-fusion/settings/publishing/
      - name: Publish to PyPI (token fallback)
        id: publish_token
        if: ${{ steps.publish_oidc.outcome != 'success' }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Ensure publish succeeded
        if: ${{ steps.publish_oidc.outcome != 'success' && steps.publish_token.outcome != 'success' }}
        run: |
          echo "PyPI publish failed for both OIDC and token fallback."
          exit 1

  verify-pypi-parity:
    name: Verify PyPI version parity
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Verify PyPI package version
        run: |
          python tools/check_pypi_sync.py \
            --package scpn-fusion \
            --mode equal \
            --strip-v-prefix \
            --retries 30 \
            --retry-delay 10

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true  # TestPyPI is best-effort; don't fail the release
    environment:
      name: testpypi
      url: https://test.pypi.org/p/scpn-fusion
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7
        with:
          name: dist
          path: dist/
      - name: Verify dist checksums
        run: |
          cd dist
          sha256sum -c SHA256SUMS
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
