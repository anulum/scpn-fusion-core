# SCPN Fusion Core — Publish to PyPI
name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (tag/sha/branch). Defaults to current ref."
        required: false
        default: ""
        type: string
      publish_testpypi:
        description: "Publish to TestPyPI. Requires TestPyPI trusted publisher configuration."
        required: false
        default: false
        type: boolean

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write  # Required for trusted publisher (OIDC)
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          lfs: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Release readiness gate
        run: |
          expected=""
          if [ "${{ github.event_name }}" = "push" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            expected="${GITHUB_REF_NAME}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.ref }}" ] && [[ "${{ inputs.ref }}" == v* ]]; then
            expected="${{ inputs.ref }}"
          fi

          if [ -n "${expected}" ]; then
            python tools/check_release_readiness.py --expected-version "${expected}"
          else
            python tools/check_release_readiness.py --allow-not-ready
          fi
      - name: Install release validation dependencies
        run: |
          pip install --require-hashes -r requirements/ci-py312.txt
          pip install --no-deps -e .
      - name: Run critical release validation
        run: |
          pytest -q tests/test_version_metadata.py
          python tools/run_python_preflight.py --gate release
      - name: Install build tools
        run: pip install --require-hashes -r requirements/build.txt
      - name: Build sdist and wheel
        run: python -m build
      - name: Generate release checksums
        run: |
          python tools/generate_release_checksums.py \
            --dist-dir dist \
            --output-file dist/SHA256SUMS \
            --summary-json artifacts/release_checksums_summary.json
      - name: Verify release checksums
        run: |
          python tools/verify_release_checksums.py \
            --dist-dir dist \
            --manifest dist/SHA256SUMS \
            --summary-json artifacts/release_checksums_verify_summary.json
      - name: Twine metadata check
        run: python -m twine check dist/*.whl dist/*.tar.gz
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
      - name: Upload checksum summaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-checksums
          path: |
            artifacts/release_checksums_summary.json
            artifacts/release_checksums_verify_summary.json

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/scpn-fusion
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7
        with:
          name: dist
          path: dist/
      - name: Verify dist checksums
        run: |
          cd dist
          sha256sum -c SHA256SUMS
          rm SHA256SUMS
      - name: Detect existing PyPI distribution
        id: existing_pypi
        run: |
          python - <<'PY' >>"$GITHUB_OUTPUT"
          import json
          import re
          import urllib.request
          from pathlib import Path

          wheels = sorted(Path("dist").glob("scpn_fusion-*.whl"))
          if not wheels:
              raise SystemExit("No scpn_fusion wheel found in dist/")
          match = re.match(r"^scpn_fusion-(?P<version>[^-]+)-", wheels[0].name)
          if match is None:
              raise SystemExit(f"Unable to parse version from {wheels[0].name}")
          version = match.group("version")
          req = urllib.request.Request(
              "https://pypi.org/pypi/scpn-fusion/json",
              headers={"Accept": "application/json", "Cache-Control": "no-cache"},
          )
          with urllib.request.urlopen(req, timeout=30) as response:
              payload = json.load(response)
          exists = bool(payload.get("releases", {}).get(version))
          print(f"version={version}")
          print(f"exists={'true' if exists else 'false'}")
          PY
      - name: Publish to PyPI (OIDC)
        id: publish_oidc
        if: ${{ steps.existing_pypi.outputs.exists != 'true' }}
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # release/v1
        # Uses OIDC trusted publisher — no API token needed
        # Configure at: https://pypi.org/manage/project/scpn-fusion/settings/publishing/
      - name: Publish to PyPI (token fallback)
        id: publish_token
        if: ${{ steps.existing_pypi.outputs.exists != 'true' && steps.publish_oidc.outcome != 'success' }}
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Ensure publish succeeded
        if: ${{ steps.existing_pypi.outputs.exists != 'true' && steps.publish_oidc.outcome != 'success' && steps.publish_token.outcome != 'success' }}
        run: |
          echo "PyPI publish failed for both OIDC and token fallback."
          exit 1

  verify-pypi-parity:
    name: Verify PyPI version parity
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Verify PyPI package version
        run: |
          python tools/check_pypi_sync.py \
            --package scpn-fusion \
            --mode equal \
            --strip-v-prefix \
            --retries 30 \
            --retry-delay 10

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_testpypi }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/scpn-fusion
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7
        with:
          name: dist
          path: dist/
      - name: Verify dist checksums
        run: |
          cd dist
          sha256sum -c SHA256SUMS
          rm SHA256SUMS
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
