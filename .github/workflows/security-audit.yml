# SCPN Fusion Core — Security Audit
name: Security Audit

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

concurrency:
  group: security-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-dependency-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Install audit tooling
        run: |
          pip install --require-hashes -r requirements/build.txt
          pip install --no-deps -e .
      - name: Run pip-audit (strict)
        run: |
          mkdir -p artifacts
          python -m pip freeze --all > artifacts/pip-freeze.txt
          python - <<'PY'
          from pathlib import Path

          src = Path("artifacts/pip-freeze.txt")
          dst = Path("artifacts/pip-audit-requirements.txt")
          lines: list[str] = []
          for raw in src.read_text(encoding="utf-8").splitlines():
              line = raw.strip()
              if not line:
                  continue
              lower = line.lower()
              # Exclude local editable/install refs that are not resolvable on PyPI.
              if lower.startswith("-e "):
                  continue
              if " @ file://" in lower:
                  continue
              if lower.startswith("scpn-fusion @"):
                  continue
              lines.append(line)
          dst.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"Wrote {len(lines)} requirements for pip-audit: {dst}")
          PY
          set +e
          pip-audit -r artifacts/pip-audit-requirements.txt --desc on --format json --output artifacts/pip-audit.json
          audit_exit=$?
          set -e
          if [ ! -s artifacts/pip-audit.json ]; then
            echo '{"error":"pip-audit produced no JSON output"}' > artifacts/pip-audit.json
          fi
          exit $audit_exit
      - name: Upload Python audit artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-dependency-audit
          path: artifacts/pip-audit.json

  rust-dependency-audit:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scpn-fusion-rs
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: |
          mkdir -p ../artifacts
          cargo audit --deny warnings --json > ../artifacts/cargo-audit.json
      - name: Upload Rust audit artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: rust-dependency-audit
          path: artifacts/cargo-audit.json

  snyk-audit:
    name: Snyk Dependency Audit
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Install pinned Snyk CLI
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/setup@8e119fbb6c251787721d34ba683ed48eba792766
        with:
          snyk-version: 1.1301.1
      - name: Run Snyk when token is configured
        run: |
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "SNYK_TOKEN is not configured; skipping optional Snyk audit."
            exit 0
          fi
          mkdir -p artifacts
          snyk test --all-projects --severity-threshold=high --json-file-output=artifacts/snyk.json
      - name: Upload Snyk audit artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: snyk-dependency-audit
          path: artifacts/snyk.json
          if-no-files-found: ignore
