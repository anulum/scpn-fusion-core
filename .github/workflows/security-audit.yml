# SCPN Fusion Core — Security Audit
name: Security Audit

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

concurrency:
  group: security-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-dependency-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Install audit tooling
        run: |
          pip install --require-hashes -r requirements/build.txt
          pip install --no-deps -e .
      - name: Run pip-audit (strict)
        run: |
          mkdir -p artifacts
          python -m pip freeze --all > artifacts/pip-freeze.txt
          python - <<'PY'
          from pathlib import Path

          src = Path("artifacts/pip-freeze.txt")
          dst = Path("artifacts/pip-audit-requirements.txt")
          lines: list[str] = []
          for raw in src.read_text(encoding="utf-8").splitlines():
              line = raw.strip()
              if not line:
                  continue
              lower = line.lower()
              # Exclude local editable/install refs that are not resolvable on PyPI.
              if lower.startswith("-e "):
                  continue
              if " @ file://" in lower:
                  continue
              if lower.startswith("scpn-fusion @"):
                  continue
              lines.append(line)
          dst.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"Wrote {len(lines)} requirements for pip-audit: {dst}")
          PY
          set +e
          pip-audit -r artifacts/pip-audit-requirements.txt --desc on --format json --output artifacts/pip-audit.json
          audit_exit=$?
          set -e
          if [ ! -s artifacts/pip-audit.json ]; then
            echo '{"error":"pip-audit produced no JSON output"}' > artifacts/pip-audit.json
          fi
          exit $audit_exit
      - name: Upload Python audit artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: python-dependency-audit
          path: artifacts/pip-audit.json

  rust-dependency-audit:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scpn-fusion-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: |
          mkdir -p ../artifacts
          cargo audit --json > ../artifacts/cargo-audit.json
      - name: Upload Rust audit artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: rust-dependency-audit
          path: artifacts/cargo-audit.json
