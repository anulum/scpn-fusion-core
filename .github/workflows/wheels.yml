name: Build Wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish built wheel/sdist artifacts to PyPI"
        required: false
        type: boolean
        default: false

concurrency:
  group: wheels-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Build wheel matrix (cp39-cp312)
        uses: PyO3/maturin-action@v1
        with:
          manylinux: auto
          working-directory: scpn-fusion-rs/crates/fusion-python
          command: build
          args: --release --strip --out ../../../dist --interpreter 3.9 3.10 3.11 3.12

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl

  build-sdist:
    name: Build sdist (pure Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish Rust wheels to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: >
      (startsWith(github.ref, 'refs/tags/v') && vars.WHEELS_PUBLISH_ENABLED == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    environment:
      name: pypi
      url: https://pypi.org/p/scpn-fusion-rs
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
