# SCPN Fusion Core — FreeGS Strict Backend Gate
name: FreeGS Strict Backend Gate

on:
  workflow_dispatch:

concurrency:
  group: freegs-strict-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  freegs-strict:
    name: FreeGS Strict Parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements/ci-benchmark.txt
          pip install --no-deps -e .

      - name: Run FreeGS strict-backend benchmark
        run: |
          python validation/benchmark_vs_freegs.py --strict-backend

      - name: Enforce FreeGS strict artifact contract
        run: |
          python tools/check_freegs_strict_artifact.py \
            --report artifacts/freegs_benchmark.json \
            --summary-json artifacts/freegs_strict_guard_summary.json

      - name: Upload FreeGS strict artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: freegs-strict-gate
          path: |
            artifacts/freegs_benchmark.json
            artifacts/freegs_strict_guard_summary.json
