[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "scpn-fusion"
version = "3.9.11"
description = "SCPN Fusion Core - Advanced Plasma Physics & Control Suite"
authors = [
    {name = "Miroslav Sotek"},
]
license = {text = "AGPL-3.0-or-later"}
classifiers = [
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Rust",
    "Topic :: Scientific/Engineering :: Physics",
    "Development Status :: 4 - Beta",
]
readme = "README.md"
dependencies = [
    "click>=8.1",
    "numpy>=1.24,<2.0",
    "matplotlib",
    "scipy",
    "pydantic>=2.0",
    "pandas>=1.5",
    "requests>=2.31",
]
requires-python = ">=3.10"

[project.urls]
Homepage = "https://github.com/anulum/scpn-fusion-core"
Documentation = "https://anulum.github.io/scpn-fusion-core/"
Repository = "https://github.com/anulum/scpn-fusion-core"
"Bug Tracker" = "https://github.com/anulum/scpn-fusion-core/issues"

[project.optional-dependencies]
ui = [
    "streamlit",
]
ml = [
    "jax>=0.4.20",
    "jaxlib>=0.4.20",
]
rl = [
    "gymnasium>=1.0.0",
]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=5.0",
    "hypothesis>=6.0",
    "mypy>=1.10",
    "ruff>=0.8",
    "bandit>=1.7",
    "pre-commit>=3.0",
    "types-psutil>=7.2.2.20260518",
]
fuzz = [
    "atheris>=2.3",
]
rust = [
    "maturin>=1.7,<2.0",
]
snn = []  # pure-numpy LIF+NEF engine, no external deps
benchmark = [
    "freegs>=0.6",
]
full-physics = [
    "freegs>=0.6",
    "omas>=0.70",
]
gpu = [
    "jax[cuda12]>=0.4.20",
    "cupy-cuda12x>=13.6,<14.0",
    "nvidia-cuda-nvrtc-cu12>=12.0,<13.0",
]
mpi = [
    "mpi4py>=4.1",
]
full = [
    "streamlit",
    "jax>=0.4.20",
    "jaxlib>=0.4.20",
    "cupy-cuda12x>=13.6,<14.0",
    "nvidia-cuda-nvrtc-cu12>=12.0,<13.0",
    "gymnasium>=1.0.0",
    "freegs>=0.6",
    "mpi4py>=4.1",
    "omas>=0.70",
    "maturin>=1.7,<2.0",
]

[tool.setuptools]
packages = ["scpn_fusion", "validation"]
package-dir = {"" = "src", "validation" = "validation"}

[project.scripts]
scpn-fusion = "scpn_fusion.cli:main"
scpn-dashboard = "scpn_fusion.ui.dashboard_launcher:main"

[tool.mypy]
strict = true
ignore_missing_imports = false

