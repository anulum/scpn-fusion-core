[[tool.mypy.overrides]]
module = ["sc_neurocore", "sc_neurocore.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["scpn_fusion_rs"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["matplotlib", "matplotlib.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["MDSplus", "MDSplus.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["scipy", "scipy.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["streamlit", "streamlit.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["omas", "omas.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "scpn_fusion.control.h_infinity_controller",
    "scpn_fusion.control.fokker_planck_re",
    "scpn_fusion.control.spi_ablation",
    "scpn_fusion.control.fusion_nmpc_jax",
    "scpn_fusion.core.mhd_sawtooth",
    "scpn_fusion.core.divertor_thermal_sim",
]
disallow_untyped_defs = true

[tool.pytest.ini_options]
addopts = "-p no:pytest_nengo --strict-markers"
markers = [
    "slow: marks long-running regression tests",
    "experimental: marks experimental/research-only validation lanes",
    "stress: marks stress tests (long-running, main-push only)",
]
filterwarnings = [
    "error::DeprecationWarning",
    "ignore:.*oneOf.*[dD]eprecated.*:Warning",
    "default::UserWarning",
]
xfail_strict = true

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = ["notebooks", "validation/reference_data", "weights"]

[tool.ruff.lint]
# NumPy-convention docstring (`D`) rules are enforced separately on the strict
# mypy cohort via `tools/run_ruff_docstrings.py` (wired into the preflight gate),
# so the cohort is the single source of truth for both typing and docstrings.
# They are intentionally kept out of the global `select` until every src module
# has graduated into the cohort.
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
  "E501",
  "E402",
  "E741",
  "I001",
  "UP006", "UP007", "UP015", "UP031", "UP035", "UP037", "UP038", "UP045",
  "F841",
  "SIM102", "SIM105", "SIM108",
  "B007", "B017", "B018", "B023", "B028", "B904", "B905",
]

[tool.ruff.lint.per-file-ignores]
# Re-exports
"__init__.py" = ["F401"]
# Notebooks: re-exports + cell redefinitions
"examples/*.ipynb" = ["F401", "F811"]
# Conditional imports in try/except blocks (optional dependencies)
"src/scpn_fusion/control/director_interface.py" = ["F401"]
"src/scpn_fusion/control/fusion_nmpc_jax.py" = ["F401"]
"src/scpn_fusion/core/_rust_compat.py" = ["F401"]
"src/scpn_fusion/core/fno_turbulence_suppressor.py" = ["F401"]
"src/scpn_fusion/core/force_balance.py" = ["F401"]
"src/scpn_fusion/core/current_diffusion.py" = ["F841"]
"src/scpn_fusion/core/global_design_scanner.py" = ["F401"]
"src/scpn_fusion/core/lazarus_bridge.py" = ["F401"]
"src/scpn_fusion/core/vibrana_bridge.py" = ["F401"]
"src/scpn_fusion/core/wdm_engine.py" = ["F401"]
# Forward reference to TransportSolver (circular import guard)
"src/scpn_fusion/core/integrated_transport_solver_adaptive.py" = ["F821"]
# Conditional imports in tests/tools/validation
"tests/test_rust_python_parity.py" = ["F401"]
"tests/test_fno_training.py" = ["F401"]
"tests/test_gpu_jax_backend.py" = ["F401"]
"tools/generate_benchmark_plots.py" = ["F401"]
"validation/benchmark_vs_freegs.py" = ["F401"]

[tool.bandit]
skips = ["B101", "B311"]
exclude_dirs = ["tests", "notebooks", "validation"]

[tool.coverage.run]
source = ["scpn_fusion"]
omit = [
]

[tool.coverage.report]
exclude_lines = [
    "if __name__",
    "raise NotImplementedError",
    "except ImportError",
    "if HAS_JAX",
    "if HAS_FREEGS",
    "if HAS_OMAS",
]
