[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "scpn-fusion"
version = "3.9.11"
description = "SCPN Fusion Core - Advanced Plasma Physics & Control Suite"
authors = [
    {name = "Miroslav Sotek"},
]
license = {text = "AGPL-3.0-or-later"}
classifiers = [
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Rust",
    "Topic :: Scientific/Engineering :: Physics",
    "Development Status :: 4 - Beta",
]
readme = "README.md"
dependencies = [
    "click>=8.1,<9",
    "numpy>=1.24,<2.0",
    "matplotlib>=3.5,<4",
    "scipy>=1.10,<2",
    "pydantic>=2.0,<3",
    "pandas>=1.5,<4",
    "requests>=2.31,<3",
]
requires-python = ">=3.10"

[project.urls]
Homepage = "https://github.com/anulum/scpn-fusion-core"
Documentation = "https://anulum.github.io/scpn-fusion-core/"
Repository = "https://github.com/anulum/scpn-fusion-core"
"Bug Tracker" = "https://github.com/anulum/scpn-fusion-core/issues"

[project.optional-dependencies]
ui = [
    "streamlit",
]
ml = [
    "jax>=0.4.20",
    "jaxlib>=0.4.20",
]
rl = [
    "gymnasium>=1.0.0",
]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=5.0",
    "hypothesis>=6.0",
    "mypy>=1.10",
    "ruff>=0.8",
    "bandit>=1.7",
    "pre-commit>=3.0",
    "types-psutil>=7.2.2.20260518",
]
fuzz = [
    "atheris>=2.3",
]
rust = [
    "maturin>=1.7,<2.0",
]
snn = []  # pure-numpy LIF+NEF engine, no external deps
studio = [
    "scpn-studio-platform>=0.9,<0.11",
]
benchmark = [
    "freegs>=0.6",
]
full-physics = [
    "freegs>=0.6",
    "omas>=0.70",
]
gpu = [
    "jax[cuda12]>=0.4.20",
    "cupy-cuda12x>=13.6,<14.0",
    "nvidia-cuda-nvrtc-cu12>=12.0,<13.0",
]
mpi = [
    "mpi4py>=4.1",
]
full = [
    "streamlit",
    "jax>=0.4.20",
    "jaxlib>=0.4.20",
    "cupy-cuda12x>=13.6,<14.0",
    "nvidia-cuda-nvrtc-cu12>=12.0,<13.0",
    "gymnasium>=1.0.0",
    "freegs>=0.6",
    "mpi4py>=4.1",
    "omas>=0.70",
    "maturin>=1.7,<2.0",
]

[tool.setuptools]
package-dir = {"" = "src", "validation" = "validation", "weights" = "weights"}

# Discover every scpn_fusion subpackage (core/, control/, io/, …) plus the
# validation package; the previous explicit ``packages`` list named only the
# top-level packages, so the built wheel shipped scpn_fusion/*.py but none of
# the subpackages, leaving it non-importable for downstream consumers.
[tool.setuptools.packages.find]
where = ["src", "."]
include = ["scpn_fusion*", "validation*", "weights"]

# Ship the reference datasets the package loads at import/runtime (e.g. the IPB98
# scaling coefficients read at module import in core/scaling_laws) so the wheel is
# usable, not just importable.
[tool.setuptools.package-data]
validation = [
    "**/*.json",
    "**/*.npz",
    "**/*.geqdsk",
    "**/*.eqdsk",
    "**/*.csv",
]
# Ship only the small runtime surrogate weights the library loads by default (~12 MB
# total). Large training-only checkpoints — the 302 MB legacy ``fno_turbulence_jax.npz``
# (opt-in via SCPN_ENABLE_LEGACY_FNO) and the variant/augmented artifacts — are
# deliberately excluded to keep the wheel within a sane distribution size.
weights = [
    "neural_transport_qlknn.npz",
    "neural_transport_qlknn.metrics.json",
    "neural_equilibrium_sparc.npz",
    "neural_equilibrium_iter_v1.npz",
    "pretrained_mlp_itpa.npz",
    "pretrained_fno_eurofusion_jet.npz",
    "pretrained_surrogates_manifest.json",
]
scpn_fusion = ["py.typed"]

# Exclude large training-only datasets from the wheel. The 157 MB TGLF training
# corpus is consumed solely by tools/generate_tglf_dataset.py (a source-tree
# training utility) and is never loaded by the installed library, so shipping it
# would push the wheel past the PyPI size limit for no runtime benefit.
[tool.setuptools.exclude-package-data]
validation = ["reference_data/tglf_training_data.npz"]

[project.scripts]
scpn-fusion = "scpn_fusion.cli:main"
scpn-dashboard = "scpn_fusion.ui.dashboard_launcher:main"
scpn-emit-studio-manifest = "scpn_fusion.studio.federation:main"

[tool.mypy]
strict = true
ignore_missing_imports = false

# Strict defaults apply to every mypy invocation. The file cohort below is the
# currently gated typed surface and is expanded incrementally as modules are
# brought to strict-clean status.
